# MMM Platform Configuration
# Windsor.ai account mappings per client

windsor:
  api_url: "https://connectors.windsor.ai/all"
  # API key loaded from Streamlit secrets (never commit to repo)
  api_key: null

clients:
  juniper:
    display_name: "Juniper"
    currency: "SEK"
    channels:
      meta:
        windsor_connector: "facebook"
        windsor_account: "260486998006445"
        spend_field: "spend"
        impressions_field: "impressions"
      google_ads:
        windsor_connector: "google_ads"
        windsor_account: "732-548-8423"
        spend_field: "spend"
        impressions_field: "impressions"
      pinterest:
        windsor_connector: "pinterest"
        windsor_account: "549762165504"
        spend_field: "spend"
        impressions_field: "impressions"
      # TikTok: not connected for Juniper
      # SMS: via CSV upload
    email_source:
      # Klaviyo via Windsor — CONNECTED
      windsor_connector: "klaviyo"
      windsor_account: "HpJAU2"
      # Available fields: opens, clicks, revenue, subject, unsubscribed
      # Note: Klaviyo returns per-campaign rows; ingestion aggregates to daily totals
      opens_field: "opens"
      clicks_field: "clicks"
      revenue_field: "revenue"  # Klaviyo-attributed revenue (placed orders)
    revenue_source:
      windsor_connector: "shopify"
      windsor_account: "juniperstorefront.myshopify.com"
      revenue_field: "order_total_price"
      orders_field: "order_count"
    events_csv: "events/juniper_events.csv"

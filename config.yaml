# Model defaults
model:
  granularity: "weekly"  # weekly recommended for 2+ year datasets
  min_weeks: 52          # minimum data required to run model
  recommended_weeks: 104 # ideal amount
  n_warmup: 1000         # MCMC warmup samples
  n_samples: 1000        # MCMC posterior samples
  n_chains: 4            # parallel MCMC chains
  test_weeks: 8          # holdout period for validation
